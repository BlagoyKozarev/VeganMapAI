<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings – VeganMapAI</title>

  <!-- Apply stored theme BEFORE paint (default: light) -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', (t === 'dark' ? 'dark' : 'light'));
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <style>
    /* THEME TOKENS: Light (default) + Dark */
    :root[data-theme="light"]{
      /* backgrounds */
      --bg-top:#f7fafc;
      --bg-bot:#eef2f7;
      --surface:#ffffff;
      --elev:#f5f7fb;
      /* text */
      --text:#0f1720;
      --muted:#4b5563;
      --line:rgba(15,23,32,0.08);
      /* accents */
      --accent:#22c55e;
      --accent-600:#16a34a;
      --focus:#2563eb;
      --active:#eaf3ff;
    }
    :root[data-theme="dark"]{
      --bg-top:#0b0f14;
      --bg-bot:#0e141c;
      --surface:#121821;
      --elev:#0f1520;
      --text:#e8f0f7;
      --muted:#9fb0c3;
      --line:rgba(255,255,255,0.08);
      --accent:#22c55e;
      --accent-600:#16a34a;
      --focus:#5ac8fa;
      --active:#1a2330;
    }

    *{box-sizing:border-box}
    html,body{margin:0}
    body{
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;
      background:linear-gradient(180deg,var(--bg-top),var(--bg-bot));
      color:var(--text); line-height:1.5; min-height:100vh;
    }
    a{color:inherit;text-decoration:none}

    /* Header */
    .header{background:var(--surface);border-bottom:1px solid var(--line);padding:20px 0}
    .container{max-width:600px;margin:0 auto;padding:0 16px}
    .back-link{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:14px;margin-bottom:16px}
    .back-link:hover{color:var(--text)}
    h1{font-size:28px;margin:0}

    /* Settings card */
    .settings-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px;margin-top:24px}
    .setting-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--line)}
    .setting-row:last-child{border-bottom:none}
    .setting-label{font-weight:600}
    .setting-desc{color:var(--muted);font-size:14px;margin-top:4px}

    /* Radio group */
    .radio-group{display:flex;gap:16px}
    .radio-option{display:flex;align-items:center;gap:8px;cursor:pointer}
    .radio-option input[type="radio"]{
      width:18px;height:18px;cursor:pointer;
      accent-color:var(--accent);
    }
    .radio-option label{cursor:pointer}

    /* Footer */
    footer{padding:32px 0;text-align:center;color:var(--muted);margin-top:auto}
  </style>
</head>
<body>
  <div class="header">
    <div class="container">
      <a href="/pages/mock-step1.html" class="back-link">← Back</a>
      <h1>Settings</h1>
    </div>
  </div>

  <div class="container">
    <div class="settings-card">
      <div class="setting-row">
        <div>
          <div class="setting-label">Theme</div>
          <div class="setting-desc">Choose your preferred color scheme</div>
        </div>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" id="light" name="theme" value="light" checked>
            <label for="light">Light</label>
          </div>
          <div class="radio-option">
            <input type="radio" id="dark" name="theme" value="dark">
            <label for="dark">Dark</label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">© 2025 VeganMapAI</div>
  </footer>

  <script>
    // Initialize theme radio based on localStorage
    (function() {
      var currentTheme = localStorage.getItem('theme') || 'light';
      var radio = document.querySelector('input[name="theme"][value="' + currentTheme + '"]');
      if (radio) radio.checked = true;

      // Handle theme change
      document.querySelectorAll('input[name="theme"]').forEach(function(input) {
        input.addEventListener('change', function() {
          var theme = this.value;
          localStorage.setItem('theme', theme);
          document.documentElement.setAttribute('data-theme', theme);
        });
      });
    })();
  </script>
</body>
</html>
