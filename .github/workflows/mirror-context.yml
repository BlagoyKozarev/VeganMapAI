name: Mirror context (public)

on:
  push:
    branches: [ main ]
    paths:
      - 'context/**'
      - 'docs/**'
      - 'api/openapi.yml'
  workflow_dispatch: {}

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout core
        uses: actions/checkout@v4

      - name: Build mirror directory (allowlist)
        run: |
          rm -rf mirror && mkdir -p mirror/context mirror/docs mirror/api
          [ -d context ] && cp -r context/* mirror/context/ || true
          [ -d docs ] && cp -r docs/* mirror/docs/ || true
          [ -f api/openapi.yml ] && cp api/openapi.yml mirror/api/openapi.yml || true
          # Санитайзер за ключове
          find mirror -type f -exec sed -i \
            -e 's/[A-Z0-9_]*API_KEY\=[^ ]\+/API_KEY=REDACTED/g' {} \;

      - name: Publish to public mirror
        env:
          GH_TOKEN: ${{ secrets.CONTEXT_MIRROR_TOKEN }}
        run: |
          git config --global user.email "mirror-bot@users.noreply.github.com"
          git config --global user.name "mirror-bot"
          rm -rf pub && mkdir pub
          cd pub
          gh repo clone BlagoyKozarev/VeganMapAI-context-mirror .
          rm -rf *
          cp -r ../mirror/* .
          git add .
          git commit -m "chore: mirror context from core" || echo "No changes"
          git push origin HEAD:main